<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- 手机桌面APP功能 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="匯率">
    <meta name="mobile-web-app-capable" content="yes">

    <title>國際匯率換算</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f7fa;
            text-align: center;
            padding: 20px;
        }
        .card {
            max-width: 380px;
            margin: 0 auto;
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .rabbit {
            width: 70px;
            margin-bottom: 10px;
        }
        h2 {
            color: #333;
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border-radius: 10px;
            border: 1px solid #ddd;
            margin-bottom: 15px;
            text-align: center;
        }
        button {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border-radius: 10px;
            border: none;
            background: #0066CC;
            color: white;
            margin-bottom: 10px;
        }
        .result {
            font-size: 18px;
            font-weight: bold;
            margin-top: 15px;
            color: #222;
            text-align: left;
            padding: 10px;
        }
        .note {
            font-size: 12px;
            color: #777;
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <div class="card">
        <!-- 你旧版果只兔子 -->
        <img class="rabbit" src="https://i.imgur.com/ycZbJt9.png">
        <h2>國際匯率即時換算</h2>

        <input type="number" id="amount" placeholder="輸入金額">
        <button onclick="convertAll()">換算所有貨幣</button>
        <div class="result" id="result"></div>
        <div class="note">參考匯率：1 MOP = 0.97 HKD / 1 MOP = 0.79 RMB / 1 MOP = 0.11 USD</div>
    </div>

    <script>
        function convertAll() {
            let mop = parseFloat(document.getElementById("amount").value) || 0;
            let hkd = mop * 0.97;
            let rmb = mop * 0.79;
            let usd = mop * 0.11;

            let output = `
澳門元 (MOP)：${mop.toFixed(2)} <br>
港幣 (HKD)：${hkd.toFixed(2)} <br>
人民幣 (RMB)：${rmb.toFixed(2)} <br>
美元 (USD)：${usd.toFixed(2)}
            `;
            document.getElementById("result").innerHTML = output;
        }
    </script>
</body>
</html>
