<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style"="default">
<meta name="apple-mobile-web-app-title" content="匯率換算">
<meta name="mobile-web-app-capable" content="yes">
<title>匯率換算</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body {
        font-family: Arial, sans-serif;
        background: #f8f8f8;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
    }
    .container {
        max-width: 400px;
        width: 100%;
        background: white;
        padding: 40px 30px;
        border-radius: 20px;
        text-align: center;
        box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    /* 匹配截图的兔子样式 */
    .rabbit {
        font-size: 60px;
        margin-bottom: 15px;
        line-height: 1;
    }
    h2 {
        font-size: 28px;
        font-weight: bold;
        margin-bottom: 30px;
        color: #333;
    }
    input, select {
        width: 100%;
        padding: 14px 16px;
        font-size: 16px;
        border: 1px solid #ddd;
        border-radius: 8px;
        margin-bottom: 16px;
        outline: none;
    }
    input::placeholder {
        color: #999;
    }
    /* 橙色换算按钮 */
    button {
        width: 100%;
        padding: 16px;
        background: #ff7f00; /* 标准橙色，匹配常见设计 */
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 18px;
        font-weight: 500;
        cursor: pointer;
    }
    button:hover {
        background: #e67000;
    }
    .result {
        margin-top: 20px;
        font-size: 18px;
        font-weight: bold;
        color: #333;
    }
</style>
</head>

<body>
<div class="container">
    <!-- 截图同款兔子符号 -->
    <div class="rabbit">🐰</div>
    <h2>匯率換算</h2>

    <input type="number" id="amt" placeholder="輸入金額">
    <select id="from">
        <option value="MOP">澳門元 MOP</option>
        <option value="HKD">港幣 HKD</option>
        <option value="RMB">人民幣 RMB</option>
        <option value="USD">美元 USD</option>
    </select>

    <select id="to">
        <option value="HKD">港幣 HKD</option>
        <option value="MOP">澳門元 MOP</option>
        <option value="RMB">人民幣 RMB</option>
        <option value="USD">美元 USD</option>
    </select>

    <button onclick="convert()">換算</button>
    <div class="result" id="res"></div>
</div>

<script>
// 汇率数据（和之前一致，保证换算准确）
const rate = {
  MOP: { HKD: 0.97, RMB: 0.79, USD: 0.11, MOP: 1 },
  HKD: { MOP: 1.03, RMB: 0.81, USD: 0.11, HKD: 1 },
  RMB: { MOP: 1.27, HKD: 1.23, USD: 0.14, RMB: 1 },
  USD: { MOP: 9.00, HKD: 8.70, RMB: 7.20, USD: 1 }
};

// 换算核心逻辑
function convert() {
  let amount = document.getElementById("amt").value || 0;
  let fromCurrency = document.getElementById("from").value;
  let toCurrency = document.getElementById("to").value;
  let result = (amount * rate[fromCurrency][toCurrency]).toFixed(2);
  document.getElementById("res").innerText = result + " " + toCurrency;
}
</script>
</body>
</html>
